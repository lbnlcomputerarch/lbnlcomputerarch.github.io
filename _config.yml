title: LBNL Computer Architecture Group
description: Documentation and guides for the CAG computing environment
theme: just-the-docs

baseurl: ""
url: "https://lbnlcomputerarch.github.io"

color_scheme: dark

logo: "assets/img/cag-logo.png"
favicon_ico: "/assets/favicon/favicon.ico"

search_enabled: false
heading_anchors: true
enable_copy_code_button: true

# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%Y %b %e at %H:%M %z" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html

aux_links:
  "Official CAG Site": https://amcr.lbl.gov/departments/computer-science-department/cag/
  "LBNL Homepage": https://www.lbl.gov/

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-email-protect

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
